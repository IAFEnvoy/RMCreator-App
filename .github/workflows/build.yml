name: Tauri 2 Multi-Platform Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: windows

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: macos-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x86_64
            dependencies: >
              libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev
              libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.dependencies }}

      - name: Install npm dependencies (including Tauri CLI)
        run: npm install

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Prepare build artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          CANDIDATE_DIRS=(
            "src-tauri/target/${{ matrix.target }}/release"
            "src-tauri/target/release"
          )

          SRC_BIN=""
          for BIN_DIR in "${CANDIDATE_DIRS[@]}"; do
            if [ -f "$BIN_DIR/RMCreator.exe" ]; then
              SRC_BIN="$BIN_DIR/RMCreator.exe"
              break
            elif [ -f "$BIN_DIR/rmcreator.exe" ]; then
              SRC_BIN="$BIN_DIR/rmcreator.exe"
              break
            elif [ -f "$BIN_DIR/RMCreator" ]; then
              SRC_BIN="$BIN_DIR/RMCreator"
              break
            elif [ -f "$BIN_DIR/rmcreator" ]; then
              SRC_BIN="$BIN_DIR/rmcreator"
              break
            fi
          done

          if [ -z "$SRC_BIN" ]; then
            echo "No executable found in candidate directories: ${CANDIDATE_DIRS[*]}"
            for BIN_DIR in "${CANDIDATE_DIRS[@]}"; do
              echo "--- $BIN_DIR ---"
              ls -la "$BIN_DIR" || true
            done
            exit 1
          fi

          BASENAME=$(basename "$SRC_BIN")
          if [[ "$BASENAME" == *.exe ]]; then
            DEST="release-assets/RMCreator-${{ matrix.artifact-name }}.exe"
          else
            DEST="release-assets/RMCreator-${{ matrix.artifact-name }}"
          fi

          cp "$SRC_BIN" "$DEST"
          echo "Prepared artifact: $DEST"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.artifact-name }}
          path: release-assets/*
          if-no-files-found: error
